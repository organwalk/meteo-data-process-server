server:
  port: ${SERVER_PORT:9194}

spring:
  application:
    name: user-client-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import:
      - optional:nacos:common.yaml
      - optional:nacos:${spring.application.name}.yaml
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
      config:
        server-addr: ${spring.cloud.nacos.server-addr}
        file-extension: yaml
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${USER_CLIENT_DB_URL:jdbc:mysql://localhost:3306/meteo_user?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${USER_CLIENT_DB_USERNAME:root}
    password: ${USER_CLIENT_DB_PASSWORD:change_me}
  data:
    redis:
      database: ${USER_CLIENT_REDIS_DB:1}
      host: ${USER_CLIENT_REDIS_HOST:localhost}
      port: ${USER_CLIENT_REDIS_PORT:6379}
      password: ${USER_CLIENT_REDIS_PASSWORD:}
      timeout: ${USER_CLIENT_REDIS_TIMEOUT:5s}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  security:
    token-ttl: ${USER_TOKEN_TTL:PT0S}
    password-strength: ${USER_PASSWORD_STRENGTH:10}
    token-bytes: ${USER_TOKEN_BYTES:32}
