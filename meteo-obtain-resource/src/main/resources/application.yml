server:
  port: ${SERVER_PORT:9494}

spring:
  application:
    name: meteo-obtain-resource
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import:
      - optional:nacos:common.yaml
      - optional:nacos:${spring.application.name}.yaml
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
      config:
        server-addr: ${spring.cloud.nacos.server-addr}
        file-extension: yaml
  data:
    redis:
      database: ${METEO_OBTAIN_REDIS_DB:2}
      host: ${METEO_OBTAIN_REDIS_HOST:localhost}
      port: ${METEO_OBTAIN_REDIS_PORT:6379}
      password: ${METEO_OBTAIN_REDIS_PASSWORD:}
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${METEO_OBTAIN_DB_URL:jdbc:mysql://localhost:3306/meteo_data?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${METEO_OBTAIN_DB_USERNAME:root}
    password: ${METEO_OBTAIN_DB_PASSWORD:change_me}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  udp:
    remote-host: ${UDP_REMOTE_HOST:127.0.0.1}
    remote-port: ${UDP_REMOTE_PORT:9092}
    auth-username: ${UDP_AUTH_USERNAME:root}
    auth-password: ${UDP_AUTH_PASSWORD:change_me}
    await-timeout: ${UDP_AWAIT_TIMEOUT:PT60S}
